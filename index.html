<!doctype html>
<html lang="en">

<head>

  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO Title (HIGH IMPACT) -->
  <title>NexDiff - Web Development & Digital Marketing Company in India</title>

  <!-- Meta Description (CTR Optimized) -->
  <meta name="description"
    content="NexDiff is a leading web development and digital marketing company in India. We build websites, apps, and generate high-quality leads to grow your business." />

  <!-- Author -->
  <meta name="author" content="NexDiff" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://www.nexdiff.in/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />

  <!-- Open Graph (Facebook, LinkedIn) -->
  <meta property="og:title" content="NexDiff - Build, Market & Grow Your Business" />
  <meta property="og:description"
    content="We help businesses scale with software development, marketing, and lead generation services." />
  <meta property="og:image" content="https://www.nexdiff.in/logo.png" />
  <meta property="og:url" content="https://www.nexdiff.in/" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NexDiff - Growth & Tech Partner" />
  <meta name="twitter:description" content="Software + Marketing + Lead Generation = NexDiff Growth Engine 🚀" />
  <meta name="twitter:image" content="https://www.nexdiff.in/logo.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#0B1120" />

  <!-- 🔥 STRUCTURED DATA (MOST IMPORTANT FOR BRAND RANKING) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "NexDiff",
    "url": "https://www.nexdiff.in",
    "logo": "https://www.nexdiff.in/logo.png",
    "description": "Web Development, Digital Marketing and Lead Generation Company in India.",
    "sameAs": [
      "https://www.linkedin.com/company/nexdiff",
      "https://www.instagram.com/nexdiff"
    ]
  }
  </script>

  <!-- 🔥 LOCAL SEO (VERY IMPORTANT FOR INDIA RANKING) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "NexDiff",
    "image": "https://www.nexdiff.in/logo.png",
    "url": "https://www.nexdiff.in",
    "telephone": "+91-9001402531",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Delhi",
      "addressCountry": "India"
    },
    "sameAs": [
      "https://www.linkedin.com/company/nexdiff",
      "https://www.instagram.com/nexdiff"
    ]
  }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
