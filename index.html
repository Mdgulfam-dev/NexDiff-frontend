<!doctype html>
<html lang="en">

<head>

  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 🔥 PRIMARY TITLE (BRAND + POWER KEYWORDS) -->
  <title>NexDiff | Software Development, AI Solutions & Business Growth Company</title>

  <!-- 🔥 META DESCRIPTION (HIGH CTR + KEYWORDS) -->
  <meta name="description"
    content="NexDiff helps businesses grow with custom software development, AI solutions, and digital marketing. We build scalable apps, websites, and generate high-quality leads." />

  <!-- 🔥 KEYWORDS -->
  <meta name="keywords"
    content="NexDiff, software development company, AI solutions India, web development, app development, digital marketing, lead generation company" />

  <!-- Author -->
  <meta name="author" content="NexDiff" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://www.nexdiff.in/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />

  <!-- 🔥 OPEN GRAPH (SOCIAL PREVIEW OPTIMIZED) -->
  <meta property="og:title" content="NexDiff | Software & AI Growth Partner" />
  <meta property="og:description"
    content="Scale your business with NexDiff — software development, AI solutions, and digital marketing." />
  <meta property="og:image" content="https://www.nexdiff.in/logo.png" />
  <meta property="og:url" content="https://www.nexdiff.in/" />
  <meta property="og:type" content="website" />

  <!-- 🔥 TWITTER -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NexDiff | AI & Software Growth Company" />
  <meta name="twitter:description"
    content="Build, scale, and grow with NexDiff — software, AI, and marketing solutions." />
  <meta name="twitter:image" content="https://www.nexdiff.in/logo.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#0B1120" />

  <!-- 🔥 ORGANIZATION SCHEMA (UPGRADED) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "NexDiff",
    "alternateName": "NexDiff Technologies",
    "url": "https://www.nexdiff.in",
    "logo": "https://www.nexdiff.in/logo.png",
    "description": "NexDiff is a software development and business growth company specializing in AI solutions, web apps, and digital marketing.",
    "foundingLocation": "India",
    "sameAs": [
      "https://www.linkedin.com/company/nexdiff",
      "https://www.instagram.com/nexdiff"
    ]
  }
  </script>

  <!-- 🔥 LOCAL BUSINESS SCHEMA -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "NexDiff",
    "image": "https://www.nexdiff.in/logo.png",
    "url": "https://www.nexdiff.in",
    "telephone": "+91-9001402531",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Delhi",
      "addressCountry": "India"
    },
    "sameAs": [
      "https://www.linkedin.com/company/nexdiff",
      "https://www.instagram.com/nexdiff"
    ]
  }
  </script>

  <!-- 🔥 SERVICES SCHEMA (BOOST RANKING) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "serviceType": "Software Development & AI Solutions",
    "provider": {
      "@type": "Organization",
      "name": "NexDiff"
    },
    "areaServed": {
      "@type": "Country",
      "name": "India"
    }
  }
  </script>

  <!-- 🔥 FAQ SCHEMA (RICH RESULTS) -->
  <script type="application/ld+json">
  {
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What does NexDiff do?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "NexDiff provides software development, AI solutions, and digital marketing services to help businesses grow."
      }
    },
    {
      "@type": "Question",
      "name": "Does NexDiff build mobile apps?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, NexDiff builds scalable mobile and web applications for startups and businesses."
      }
    },
    {
      "@type": "Question",
      "name": "Is it NexDiff or Nexdiff?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The correct brand name is NexDiff, with capital N and D."
      }
    }
  ]
}
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
